name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write # OIDC to AWS — no long-lived keys anywhere (Phase 1 rule)

env:
  AWS_REGION: us-east-1

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e "./shared[dev]"
      - name: Lint
        run: |
          ruff check shared services
          ruff format --check shared services
      - name: Type-check
        run: mypy shared/aegis_core services
      - name: Test
        run: pytest shared/tests services -q

  # eval-gate job lands in Phase 9: golden-set regression + groundedness thresholds
  # that BLOCK this pipeline on failure.

  terraform:
    runs-on: ubuntu-latest
    needs: quality
    # Skip until AWS OIDC is wired up (Phase 1 account setup); set the variable to enable.
    if: vars.AWS_OIDC_ROLE_ARN != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Package Lambdas
        run: |
          pip install --quiet ./shared --target build/hello_world
          cp services/hello_world/handler.py build/hello_world/
          cd build/hello_world && zip -qr ../hello_world.zip .
      - name: Terraform fmt
        run: terraform fmt -check -recursive infra
      - name: Init
        working-directory: infra/envs/dev
        run: terraform init -backend-config=bucket=${{ vars.TF_STATE_BUCKET }} -backend-config=region=${{ env.AWS_REGION }} -backend-config=dynamodb_table=aegis-tf-lock
      - name: Plan
        if: github.event_name == 'pull_request'
        working-directory: infra/envs/dev
        run: terraform plan -no-color
      - name: Apply
        if: github.ref == 'refs/heads/main'
        working-directory: infra/envs/dev
        run: terraform apply -auto-approve
