name: ci

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "30 7 * * *" # nightly eval against the committed golden sets (drift check)

permissions:
  contents: read
  id-token: write # OIDC to AWS — no long-lived keys anywhere (Phase 1 rule)

env:
  AWS_REGION: us-east-1

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e "./shared[dev]"
      - name: Lint
        run: |
          ruff check shared services
          ruff format --check shared services
      - name: Type-check
        run: mypy shared/aegis_core services
      - name: Test
        run: pytest shared/tests services -q

  # THE deploy gate: retrieval + redaction are recomputed from scratch on every
  # run; extraction + adversarial suites read the committed results of their
  # latest live-infra runs (recomputed on demand: make bench / run_adversarial).
  # Any metric below evals/thresholds.yaml BLOCKS the deploy job below.
  # Pending Bedrock quota: groundedness LLM-judge + fabrication canaries slot in here.
  eval-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install eval deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "./shared[dev]"
          pip install fastembed faiss-cpu numpy presidio-analyzer langdetect vaderSentiment pyyaml
          python -m spacy download en_core_web_sm
      - name: Rebuild index from source docs
        run: |
          python knowledge/scripts/seed_kb.py
          python knowledge/scripts/build_index.py
      - name: Run evaluation gate
        run: python evals/run_eval.py

  terraform:
    runs-on: ubuntu-latest
    needs: [quality, eval-gate]
    # Skip until AWS OIDC is wired up (Phase 1 account setup); set the variable to enable.
    if: vars.AWS_OIDC_ROLE_ARN != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Package Lambdas
        run: make package PY=python
      - name: Terraform fmt
        run: terraform fmt -check -recursive infra
      - name: Init
        working-directory: infra/envs/dev
        run: terraform init -backend-config=bucket=${{ vars.TF_STATE_BUCKET }} -backend-config=region=${{ env.AWS_REGION }} -backend-config=dynamodb_table=aegis-tf-lock
      - name: Plan
        if: github.event_name == 'pull_request'
        working-directory: infra/envs/dev
        run: terraform plan -no-color
      - name: Apply
        if: github.ref == 'refs/heads/main'
        working-directory: infra/envs/dev
        run: terraform apply -auto-approve
