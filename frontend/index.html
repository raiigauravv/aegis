<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AEGIS — support intake</title>
<style>
  :root { color-scheme: dark; font-family: ui-sans-serif, system-ui, sans-serif; }
  body { margin: 0 auto; max-width: 720px; padding: 2rem 1rem; background: #0e1116; color: #e6e6e6; }
  h1 { font-size: 1.3rem; } h1 span { color: #6ea8fe; }
  label { display: block; margin: .8rem 0 .25rem; font-size: .85rem; color: #9aa4b2; }
  input, textarea { width: 100%; box-sizing: border-box; background: #161b22; color: #e6e6e6;
    border: 1px solid #2d333b; border-radius: 6px; padding: .55rem; font: inherit; }
  textarea { min-height: 110px; }
  button { margin-top: 1rem; background: #1f6feb; color: #fff; border: 0; border-radius: 6px;
    padding: .6rem 1.4rem; font: inherit; cursor: pointer; }
  button:disabled { opacity: .5; cursor: wait; }
  #status { margin-top: 1rem; font-size: .9rem; color: #9aa4b2; word-break: break-all; }
  .trace { margin-top: 1.5rem; border-left: 2px solid #2d333b; padding-left: 1rem; }
  .evt { margin-bottom: .9rem; }
  .evt .step { font-weight: 600; color: #6ea8fe; }
  .evt .meta { font-size: .8rem; color: #9aa4b2; }
  .badge { display: inline-block; padding: .1rem .5rem; border-radius: 999px; font-size: .75rem;
    background: #1f6feb33; color: #6ea8fe; border: 1px solid #1f6feb66; }
</style>
</head>
<body>
<h1><span>AEGIS</span> — submit a support ticket</h1>
<form id="f">
  <label for="subject">Subject (optional)</label>
  <input id="subject" maxlength="200" placeholder="Can't log in to NorthStar app">
  <label for="text">Describe the problem</label>
  <textarea id="text" required maxlength="10000" placeholder="What happened?"></textarea>
  <button id="go" type="submit">Submit ticket</button>
</form>
<div id="status"></div>
<div id="ticket"></div>

<script>
const f = document.getElementById('f'), go = document.getElementById('go'),
      status = document.getElementById('status'), ticketEl = document.getElementById('ticket');
let timer = null;

f.addEventListener('submit', async (e) => {
  e.preventDefault();
  go.disabled = true; ticketEl.innerHTML = ''; clearInterval(timer);
  status.textContent = 'Submitting…';
  const body = { text: document.getElementById('text').value };
  const subject = document.getElementById('subject').value.trim();
  if (subject) body.subject = subject;
  try {
    const r = await fetch('tickets', { method: 'POST',
      headers: { 'content-type': 'application/json' }, body: JSON.stringify(body) });
    const j = await r.json();
    if (!r.ok) throw new Error(JSON.stringify(j));
    status.textContent = `Queued as ${j.ticket_id} — waiting for pipeline…`;
    poll(j.ticket_id);
  } catch (err) {
    status.textContent = 'Error: ' + err.message;
  } finally { go.disabled = false; }
});

function poll(id) {
  let tries = 0;
  timer = setInterval(async () => {
    if (++tries > 30) { clearInterval(timer); status.textContent += ' (gave up polling)'; return; }
    const r = await fetch('tickets/' + id);
    if (r.status === 404) return;   // router hasn't persisted it yet
    const t = await r.json();
    render(id, t);
    clearInterval(timer);
  }, 1500);
}

function render(id, t) {
  status.innerHTML = `Ticket <b>${id}</b> <span class="badge">${t.meta.status}</span>`;
  ticketEl.innerHTML = '<div class="trace">' + t.trace.map(e => `
    <div class="evt">
      <div><span class="step">${e.service} · ${e.step}</span></div>
      <div class="meta">${e.at} — ${e.latency_ms ?? '?'} ms ${e.detail ? JSON.stringify(e.detail) : ''}</div>
    </div>`).join('') + '</div>';
}
</script>
</body>
</html>
